<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon-vn.svg?v=lotus" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="HistoriAI - AI Agent tra cứu lịch sử Việt Nam 1945-1975" />
  <title>HistoriAI - AI Research Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css" />
  <script>
    window.addEventListener('error', (event) => {
      const div = document.createElement('div');
      div.style.position = 'fixed';
      div.style.top = '0';
      div.style.left = '0';
      div.style.width = '100%';
      div.style.backgroundColor = 'red';
      div.style.color = 'white';
      div.style.padding = '20px';
      div.style.zIndex = '999999';
      div.style.whiteSpace = 'pre-wrap';
      div.style.fontFamily = 'monospace';
      div.innerText = event.message + '\n' + (event.error ? event.error.stack : '');
      document.body.appendChild(div);
    });
    window.addEventListener('unhandledrejection', (event) => {
      const div = document.createElement('div');
      div.style.position = 'fixed';
      div.style.top = '0';
      div.style.left = '0';
      div.style.width = '100%';
      div.style.backgroundColor = 'darkred';
      div.style.color = 'white';
      div.style.padding = '20px';
      div.style.zIndex = '999999';
      div.style.whiteSpace = 'pre-wrap';
      div.style.fontFamily = 'monospace';
      div.innerText = 'Unhandled Rejection: ' + event.reason + '\n' + (event.reason && event.reason.stack ? event.reason.stack : '');
      document.body.appendChild(div);
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
