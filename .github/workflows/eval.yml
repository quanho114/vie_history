name: Evaluation Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  retrieval-eval:
    name: Retrieval Eval
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vie_history_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval "10s"
          --health-timeout "5s"
          --health-retries "5"

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval "10s"
          --health-timeout "5s"
          --health-retries "5"

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        working-directory: apps/api
        run: |
          pip install -e ".[dev,eval]" -q

      - name: Run retrieval evaluation
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/vie_history_test
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: http://localhost:6333
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "⚠️ ANTHROPIC_API_KEY is not set. Skipping retrieval evaluation to prevent crash on fork PR."
            exit 0
          fi
          python scripts/eval_retrieval.py

  ragas-eval:
    name: RAGAS Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Only run on PRs against main (not on every push to main to save cost)
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install eval dependencies
        working-directory: apps/api
        run: |
          pip install -e ".[dev,eval]" -q
          pip install ragas datasets -q 2>/dev/null || true

      - name: Run RAGAS evaluation
        id: run-eval
        env:
          API_BASE_URL: http://localhost:8000
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAGAS_THRESHOLD: 0.70
        run: |
          if [ -z "$OPENAI_API_KEY" ] || [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "⚠️ API keys missing. Skipping RAGAS evaluation."
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          python evals/run_ragas.py \
            --max-questions 10 \
            --threshold 0.70 \
            --output evals/results.json
          echo "skipped=false" >> $GITHUB_OUTPUT

      - name: Upload evaluation results
        if: always() && steps.run-eval.outputs.skipped != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ragas-results
          path: evals/results.json
          retention-days: 30

      - name: Post result comment on PR
        if: github.event_name == 'pull_request' && steps.run-eval.outputs.skipped != 'true' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('evals/results.json')) {
              console.log("No results file found.");
              return;
            }
            const results = JSON.parse(fs.readFileSync('evals/results.json', 'utf8'));

            const metrics = results.metrics || {};
            const rows = Object.entries(metrics)
              .map(([k, v]) => `| \`${k}\` | ${Number(v).toFixed(3)} | ${v >= results.threshold ? '✅' : '❌'} |`)
              .join('\n');

            const body = `
            ## HistoriAI Evaluation Results

            | Metric | Score | Status |
            |--------|-------|--------|
            ${rows}

            **Threshold:** ${results.threshold} | **Questions evaluated:** ${results.actual_questions}
            ${results.passed ? '### ✅ All metrics passed' : '### ❌ Some metrics below threshold'}

            _Evaluated at ${results.timestamp}_
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
