name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install ruff
        run: pip install ruff -q

      - name: Run ruff check
        working-directory: apps/api
        run: ruff check . --output-format=github

      - name: Run ruff format check
        working-directory: apps/api
        run: ruff format --check .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Type check web
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Lint web
        working-directory: apps/web
        run: npx eslint src/ --max-warnings 0

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        working-directory: apps/api
        run: pip install -e ".[dev]" -q

      - name: Run unit tests
        working-directory: apps/api
        run: pytest tests/unit/ -v --tb=short

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vie_history
          POSTGRES_PASSWORD: vie_history_secret
          POSTGRES_DB: vie_history_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        working-directory: apps/api
        run: pip install -e ".[dev]" -q

      - name: Run integration tests
        working-directory: apps/api
        run: pytest tests/integration/ -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://vie_history:vie_history_secret@localhost:5432/vie_history_test
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: testing

  e2e-tests:
    name: E2E Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vie_history
          POSTGRES_PASSWORD: vie_history_secret
          POSTGRES_DB: vie_history_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:v1.7.0
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/readyz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      meilisearch:
        image: getmeili/meilisearch:v1.6
        env:
          MEILI_MASTER_KEY: meili_master_key_secret
          MEILI_NO_ANALYTICS: "true"
          MEILI_ENV: development
        ports:
          - 7700:7700
        options: >-
          --health-cmd "curl -f http://localhost:7700/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API dependencies
        working-directory: apps/api
        run: pip install -e ".[dev]" -q

      - name: Cache HuggingFace Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('apps/api/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Run migrations
        working-directory: apps/api
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://vie_history:vie_history_secret@localhost:5432/vie_history_test
          APP_ENV: development

      - name: Seed E2E User
        run: python scripts/create_e2e_user.py
        env:
          DATABASE_URL: postgresql+asyncpg://vie_history:vie_history_secret@localhost:5432/vie_history_test
          APP_ENV: development

      - name: Start FastAPI API & RQ Worker
        working-directory: apps/api
        run: |
          uvicorn app.main:app --port 12701 --host 0.0.0.0 &
          python -m rq worker ingest-queue --url redis://localhost:6379/0 &
        env:
          DATABASE_URL: postgresql+asyncpg://vie_history:vie_history_secret@localhost:5432/vie_history_test
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: http://localhost:6333
          MEILISEARCH_URL: http://localhost:7700
          MEILISEARCH_MASTER_KEY: meili_master_key_secret
          SECRET_KEY: e2e-secret-key-change-me
          APP_ENV: development

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: apps/web
        run: npx playwright install chromium --with-deps

      - name: Install Playwright System Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: apps/web
        run: npx playwright install-deps chromium

      - name: Wait for API health check
        run: |
          for i in {1..20}; do
            curl -s http://localhost:12701/health && exit 0
            sleep 2
          done
          echo "API failed to start in time"
          exit 1

      - name: Run Playwright E2E Tests
        working-directory: apps/web
        run: npx playwright test
        env:
          VITE_API_URL: http://localhost:12701
          PORT: 12702

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  docker-smoke-test:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Create Docker network
        run: docker network create historiai-network 2>/dev/null || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          load: true
          tags: historiai-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          load: true
          tags: historiai-web:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Compose up
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml up -d --wait

      - name: Wait for API health check
        run: |
          for i in {1..20}; do
            curl -s http://localhost:12701/health && exit 0
            sleep 2
          done
          echo "API failed to start in time"
          exit 1

      - name: Docker Compose down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml down

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  publish-docker:
    name: CD — Push Docker Images to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, test-unit, integration-tests, e2e-tests, docker-smoke-test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repo name to lowercase
        id: repo_name
        run: |
          echo "raw_name=${{ github.repository }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_OUTPUT

      - name: Build and Push API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo_name.outputs.raw_name }}-api:latest
            ghcr.io/${{ steps.repo_name.outputs.raw_name }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo_name.outputs.raw_name }}-web:latest
            ghcr.io/${{ steps.repo_name.outputs.raw_name }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
