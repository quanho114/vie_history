version: "3.9"

services:
  # === DATABASE (chạy Docker, còn lại chạy dev trên host) ===

  postgres:
    image: postgres:16-alpine
    container_name: vie_history_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vie_history}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vie_history_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vie_history}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "12703:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vie_history} -d ${POSTGRES_DB:-vie_history}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === CACHE ===

  redis:
    image: redis:7-alpine
    container_name: vie_history_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    ports:
      - "12704:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === VECTOR SEARCH ===

  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: vie_history_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "12705:6333"   # REST API
      - "12706:6334"   # GRPC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === ELASTICSEARCH (BM25) ===
  # Persistent BM25 index with Vietnamese analyzer and synonyms.
  # Used for keyword search alongside Qdrant vector search.

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: vie_history_meilisearch
    restart: unless-stopped
    environment:
      - MEILI_HOST=0.0.0.0:7700
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY:-meili_master_key_secret}
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meili_data:/data.ms
    ports:
      - "12707:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === GRAPH DATABASE ===
  # Neo4j community edition for persistent, multi-hop relationship and causal graph reasoning.

  neo4j:
    image: neo4j:5.18.0-community
    container_name: vie_history_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP UI Dashboard
      - "7687:7687"   # Bolt connection protocol
    environment:
      - NEO4J_AUTH=neo4j/vie_history_neo4j_secret
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

# === VOLUMES ===

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  meili_data:
  neo4j_data:
  neo4j_logs:
